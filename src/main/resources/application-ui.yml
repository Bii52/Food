server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: FoodHKD
  
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
  
  jpa:
    enabled: false
  
  messages:
    basename: messages
    encoding: UTF-8

logging:
  level:
    root: WARN
    org.springframework.web: INFO
